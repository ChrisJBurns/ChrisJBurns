name: Lowlighter Metrics

on:
  push:
    branches:
      - main
  schedule:
    # 12AM EST (midnight)
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    if: "github.repository == 'ChrisJBurns/ChrisJBurns'"
    steps:
      - name: 🙋 General
        if: ${{ success() || failure() }}
        # using our own fork that adds repositoriesContributedTo aggregation
        # to the languages plugin, so public org contributions show up too.
        uses: ChrisJBurns/metrics@f7bcce56c97a10031e9643d48a16831e9b4e5271
        with:
          filename: general.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header
          base_indepth: yes
          repositories_affiliations: owner, collaborator, organization_member
          config_order: base.header, isocalendar, languages, notable
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_indepth: no
          plugin_languages_limit: 10
          plugin_notable: yes
          plugin_notable_from: all
          plugin_notable_indepth: yes
          plugin_notable_types: commit
        
         
      - name: 🏆 Detailed Achievements, Reactions & Coding Habits
        # uses: lowlighter/metrics@latest
        # uses our own fork that bundles upstream master + fixes for:
        #   - lowlighter/metrics#1706 Projects V2 migration (Manager achievement)
        #   - lowlighter/metrics#1739 habits plugin null-commit guard
        # taken from PR lowlighter/metrics#1769 until merged upstream.
        uses: ChrisJBurns/metrics@f7bcce56c97a10031e9643d48a16831e9b4e5271
        with:
          filename: metrics.plugin.achievements.compact.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          config_order: achievements, reactions, habits
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          plugin_achievements_limit: 18
          plugin_reactions: yes
          plugin_reactions_limit: 500
          plugin_reactions_limit_issues: 200
          plugin_reactions_details: count, percentage 
          plugin_habits: yes
          plugin_habits_facts: no
          plugin_habits_charts: yes
          config_timezone: Europe/London
